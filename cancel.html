<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約の確認・変更・キャンセル — GALLERY DOT</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap"></noscript>
  <link rel="stylesheet" href="reservation-page.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Gallery Dot <span>AFTER IMAGE</span></a>
</header>

<main class="main">
  <div class="eyebrow">Reservation</div>
  <h1>予約の確認・<br><em>変更・キャンセル</em></h1>

  <!-- 検索フォーム -->
  <div class="lookup-form" id="lookup-form">
    <div class="field">
      <label for="input-id">予約番号 <span class="required">必須</span></label>
      <input type="text" id="input-id" placeholder="例：GD-X7K2MN" maxlength="10">
    </div>
    <div class="field">
      <label for="input-email">ご登録のメールアドレス <span class="required">必須</span></label>
      <input type="email" id="input-email" placeholder="例：taro@example.com">
      <span class="error-msg" id="lookup-error" style="display:none"></span>
    </div>
    <button class="btn-primary" id="btn-lookup">予約を確認する</button>
    <p class="deadline-note">※ 変更・キャンセルは前日18:00まで受け付けます</p>
  </div>

  <!-- 予約カード -->
  <div class="res-card" id="res-card">
    <div class="res-card-header">
      <span class="res-id" id="card-id"></span>
      <span class="res-status active" id="card-status">予約中</span>
    </div>
    <div class="res-card-body" id="card-body"></div>

    <!-- アクション -->
    <div class="res-actions" id="res-actions">
      <button class="btn-change" id="btn-show-change">来場日・時間帯を変更する</button>
      <button class="btn-cancel" id="btn-show-cancel">予約をキャンセルする</button>
    </div>

    <!-- 変更フォーム -->
    <div class="change-form" id="change-form">
      <h3>来場日・時間帯を変更</h3>
      <p class="change-note">変更後の来場日と時間帯を選択してください。確認メールを再送します。</p>
      <div class="field" style="margin-bottom:12px">
        <label for="new-date">新しい来場日</label>
        <select id="new-date">
          <option value="">— 来場日を選択 —</option>
          <option value="01-10">1/10（土）開幕日</option>
          <option value="01-11">1/11（日）※トーク①</option>
          <option value="01-12">1/12（月）</option>
          <option value="01-14">1/14（水）</option>
          <option value="01-15">1/15（木）</option>
          <option value="01-16">1/16（金）</option>
          <option value="01-17">1/17（土）※トーク②</option>
          <option value="01-18">1/18（日）※ライブ①</option>
          <option value="01-19">1/19（月）</option>
          <option value="01-21">1/21（水）</option>
          <option value="01-22">1/22（木）</option>
          <option value="01-23">1/23（金）</option>
          <option value="01-24">1/24（土）※トーク③</option>
          <option value="01-25">1/25（日）※ライブ②</option>
          <option value="01-26">1/26（月）最終日</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:16px">
        <label for="new-time">新しい時間帯</label>
        <select id="new-time">
          <option value="">— 時間帯を選択 —</option>
          <option>12:00</option><option>12:30</option><option>13:00</option>
          <option>13:30</option><option>14:00</option><option>14:30</option>
          <option>15:00</option><option>15:30</option><option>16:00</option>
          <option>16:30</option><option>17:00</option><option>17:30</option>
          <option>18:00</option>
        </select>
      </div>
      <!-- イベント解除警告 / イベント追加 -->
      <div id="event-warning" style="display:none;margin-bottom:16px;padding:14px 16px;background:rgba(227,79,112,0.08);border:1px solid rgba(227,79,112,0.3);border-radius:3px;">
        <p style="font-size:12px;color:#E34F70;font-weight:500;margin-bottom:6px;font-family:'DM Sans',sans-serif;letter-spacing:0.05em">⚠️ イベント予約について</p>
        <p id="event-warning-text" style="font-size:12px;color:#F0EEE9;line-height:1.7;font-family:'Noto Sans JP',sans-serif;font-weight:300"></p>
      </div>

      <!-- 変更先にイベントがある場合：参加するか選べる -->
      <div id="new-event-wrap" style="display:none;margin-bottom:16px;padding:14px 16px;background:rgba(58,167,201,0.06);border:1px solid rgba(58,167,201,0.25);border-radius:3px;">
        <p style="font-size:11px;color:#3AA7C9;font-weight:500;margin-bottom:10px;font-family:'DM Sans',sans-serif;letter-spacing:0.12em;text-transform:uppercase">★ この日はイベントがあります</p>
        <div id="new-event-check" style="display:flex;align-items:flex-start;gap:12px;cursor:pointer">
          <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer">
            <input type="checkbox" id="join-new-event" style="display:none">
            <span id="new-event-box" style="width:20px;height:20px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.2s;background:transparent"></span>
            <span id="new-event-label" style="font-size:13px;color:#F0EEE9;line-height:1.6;font-family:'Noto Sans JP',sans-serif;font-weight:300"></span>
          </label>
        </div>
      </div>

      <div style="display:flex;gap:10px">
        <button class="btn-primary" id="btn-submit-change" style="flex:1">変更を確定する</button>
        <button class="btn-cancel-no" id="btn-cancel-change" style="flex:0 0 80px">戻る</button>
      </div>
    </div>

    <!-- キャンセル確認 -->
    <div class="cancel-confirm" id="cancel-confirm">
      <p>予約をキャンセルしてもよろしいですか？<br>キャンセル後は同じ時間帯を再予約できない場合があります。</p>
      <div class="cancel-confirm-btns">
        <button class="btn-cancel-yes" id="btn-confirm-cancel">キャンセルする</button>
        <button class="btn-cancel-no" id="btn-deny-cancel">戻る</button>
      </div>
    </div>

    <!-- 結果メッセージ -->
    <div class="result-msg" id="result-msg"></div>
  </div>

  <!-- 見つからない -->
  <div class="not-found" id="not-found">
    <p>予約が見つかりませんでした。<br>予約番号とメールアドレスをご確認ください。</p>
  </div>

  <a href="index.html" class="back-link">← 展覧会トップページへ戻る</a>
</main>

<script src="reservation-logic.js"></script>
</body>
</html>
