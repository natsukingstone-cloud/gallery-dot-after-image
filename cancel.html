<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約の確認・変更・キャンセル — GALLERY DOT</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap"></noscript>
  <style>
    :root {
      --ink: #0C0C0F; --dim: #1A1A20; --mg: #E34F70;
      --aq: #3AA7C9; --sl: #6B7280; --mist: #F0EEE9;
      --brd: rgba(255,255,255,0.08); --ease: cubic-bezier(0.16,1,0.3,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--ink); color: var(--mist);
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-weight: 300; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--brd);
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; letter-spacing: 0.2em; color: var(--mist);
      text-decoration: none;
    }
    .logo span { color: var(--mg); margin-left: 10px; font-size: 11px; letter-spacing: 0.15em; }

    /* Main */
    .main { max-width: 560px; margin: 0 auto; padding: 52px 24px 80px; }

    .eyebrow {
      font-size: 9px; letter-spacing: 0.3em; color: var(--mg);
      text-transform: uppercase; font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    }
    .eyebrow::before { content:''; width:20px; height:1px; background:var(--mg); }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300; line-height: 1.1;
      color: #fff; margin-bottom: 28px;
    }
    h1 em { font-style: italic; }

    /* Lookup form */
    .lookup-form { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 11px; letter-spacing: 0.1em; color: var(--mist);
      font-family: 'DM Sans', sans-serif;
    }
    .required {
      display: inline-block; font-size: 9px; background: var(--mg);
      color: #fff; padding: 1px 5px; border-radius: 2px;
      margin-left: 6px; letter-spacing: 0.05em;
    }
    input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--brd); border-radius: 3px;
      color: var(--mist); font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 15px; font-weight: 300;
      padding: 14px 16px; width: 100%; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: var(--mg); background: rgba(227,79,112,0.05); }
    input::placeholder { color: var(--sl); }
    input.error { border-color: #ff4444; }

    .btn-primary {
      background: var(--mg); color: #fff; border: none;
      padding: 18px; font-size: 14px; font-weight: 500;
      letter-spacing: 0.06em; cursor: pointer; border-radius: 3px;
      font-family: 'DM Sans', sans-serif; width: 100%;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      font-size: 11px; color: #ff6666;
      font-family: 'DM Sans', sans-serif;
    }

    /* Reservation card */
    .res-card {
      display: none;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--brd);
      border-radius: 4px; overflow: hidden;
      margin-top: 8px;
    }
    .res-card.visible { display: block; }

    .res-card-header {
      padding: 20px 24px;
      background: rgba(227,79,112,0.08);
      border-bottom: 1px solid var(--brd);
      display: flex; align-items: center; justify-content: space-between;
    }
    .res-id {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: var(--mg); letter-spacing: 0.1em;
    }
    .res-status {
      font-size: 10px; letter-spacing: 0.12em;
      padding: 3px 10px; border-radius: 20px;
      font-family: 'DM Sans', sans-serif;
    }
    .res-status.active { background: rgba(58,167,201,0.15); color: var(--aq); }
    .res-status.cancelled { background: rgba(107,114,128,0.2); color: var(--sl); }

    .res-card-body { padding: 24px; }
    .res-row {
      display: flex; align-items: baseline;
      gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--brd);
    }
    .res-row:last-child { border-bottom: none; }
    .res-key {
      font-size: 11px; letter-spacing: 0.1em; color: #9CA3AF;
      font-family: 'DM Sans', sans-serif; min-width: 90px;
    }
    .res-val {
      font-size: 14px; color: #ffffff;
      font-family: 'Noto Sans JP', sans-serif; font-weight: 400;
    }

    /* Actions */
    .res-actions {
      padding: 20px 24px;
      border-top: 1px solid var(--brd);
      display: flex; flex-direction: column; gap: 10px;
    }
    .btn-change {
      background: transparent;
      border: 1px solid var(--aq);
      color: var(--aq); padding: 14px;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.05em; cursor: pointer;
      border-radius: 3px; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    .btn-change:hover { background: var(--aq); color: #fff; }

    .btn-cancel {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--sl); padding: 14px;
      font-size: 13px; letter-spacing: 0.05em;
      cursor: pointer; border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-cancel:hover { border-color: #ff4444; color: #ff6666; }

    /* Change form */
    .change-form {
      display: none; padding: 24px;
      border-top: 1px solid var(--brd);
      background: rgba(58,167,201,0.04);
    }
    .change-form.visible { display: block; }
    .change-form h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 300; color: #fff; margin-bottom: 18px;
    }
    .change-note {
      font-size: 12px; color: var(--sl); line-height: 1.7;
      font-family: 'Noto Sans JP', sans-serif;
      margin-bottom: 18px;
    }
    select {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--brd); border-radius: 3px;
      color: var(--mist); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 300;
      padding: 13px 14px; width: 100%; outline: none;
      transition: border-color 0.2s; cursor: pointer;
      -webkit-appearance: none;
    }
    select:focus { border-color: var(--aq); }
    select option { background: #1a1a20; color: var(--mist); }

    /* Cancel confirm */
    .cancel-confirm {
      display: none; padding: 24px;
      border-top: 1px solid var(--brd);
      background: rgba(255,68,68,0.04);
    }
    .cancel-confirm.visible { display: block; }
    .cancel-confirm p {
      font-size: 14px; color: var(--mist); line-height: 1.7;
      font-family: 'Noto Sans JP', sans-serif; margin-bottom: 18px;
    }
    .cancel-confirm-btns { display: flex; gap: 10px; }
    .btn-cancel-yes {
      flex: 1; background: rgba(255,68,68,0.15);
      border: 1px solid rgba(255,68,68,0.4);
      color: #ff6666; padding: 14px;
      font-size: 13px; cursor: pointer; border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .btn-cancel-yes:hover { background: rgba(255,68,68,0.25); }
    .btn-cancel-no {
      flex: 1; background: transparent;
      border: 1px solid var(--brd); color: var(--sl);
      padding: 14px; font-size: 13px;
      cursor: pointer; border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
    }
    .btn-cancel-no:hover { border-color: rgba(255,255,255,0.2); }

    /* Result message */
    .result-msg {
      display: none; padding: 20px 24px;
      border-radius: 3px; font-size: 13px; line-height: 1.7;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .result-msg.success { display: block; background: rgba(58,167,201,0.1); color: var(--aq); border: 1px solid rgba(58,167,201,0.3); }
    .result-msg.error-box { display: block; background: rgba(255,68,68,0.1); color: #ff8888; border: 1px solid rgba(255,68,68,0.3); }

    /* Not found */
    .not-found {
      display: none; padding: 32px 24px; text-align: center;
    }
    .not-found.visible { display: block; }
    .not-found p { font-size: 13px; color: var(--sl); line-height: 1.8; font-family: 'Noto Sans JP', sans-serif; }

    /* Deadline notice */
    .deadline-note {
      font-size: 11px; color: var(--sl); margin-top: 12px;
      line-height: 1.7; font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    /* Back link */
    .back-link {
      display: block; margin-top: 48px; text-align: center;
      font-size: 12px; color: var(--sl); letter-spacing: 0.08em;
      text-decoration: none; font-family: 'DM Sans', sans-serif;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--mist); }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Gallery Dot <span>AFTER IMAGE</span></a>
</header>

<main class="main">
  <div class="eyebrow">Reservation</div>
  <h1>予約の確認・<br><em>変更・キャンセル</em></h1>

  <!-- 検索フォーム -->
  <div class="lookup-form" id="lookup-form">
    <div class="field">
      <label for="input-id">予約番号 <span class="required">必須</span></label>
      <input type="text" id="input-id" placeholder="例：GD-X7K2MN" maxlength="10">
    </div>
    <div class="field">
      <label for="input-email">ご登録のメールアドレス <span class="required">必須</span></label>
      <input type="email" id="input-email" placeholder="例：taro@example.com">
      <span class="error-msg" id="lookup-error" style="display:none"></span>
    </div>
    <button class="btn-primary" id="btn-lookup">予約を確認する</button>
    <p class="deadline-note">※ 変更・キャンセルは前日18:00まで受け付けます</p>
  </div>

  <!-- 予約カード -->
  <div class="res-card" id="res-card">
    <div class="res-card-header">
      <span class="res-id" id="card-id"></span>
      <span class="res-status active" id="card-status">予約中</span>
    </div>
    <div class="res-card-body" id="card-body"></div>

    <!-- アクション -->
    <div class="res-actions" id="res-actions">
      <button class="btn-change" id="btn-show-change">来場日・時間帯を変更する</button>
      <button class="btn-cancel" id="btn-show-cancel">予約をキャンセルする</button>
    </div>

    <!-- 変更フォーム -->
    <div class="change-form" id="change-form">
      <h3>来場日・時間帯を変更</h3>
      <p class="change-note">変更後の来場日と時間帯を選択してください。確認メールを再送します。</p>
      <div class="field" style="margin-bottom:12px">
        <label for="new-date">新しい来場日</label>
        <select id="new-date">
          <option value="">— 来場日を選択 —</option>
          <option value="01-10">1/10（土）開幕日</option>
          <option value="01-11">1/11（日）</option>
          <option value="01-12">1/12（月）</option>
          <option value="01-14">1/14（水）</option>
          <option value="01-15">1/15（木）</option>
          <option value="01-16">1/16（金）</option>
          <option value="01-17">1/17（土）※トーク②</option>
          <option value="01-18">1/18（日）※ライブ①</option>
          <option value="01-19">1/19（月）</option>
          <option value="01-21">1/21（水）</option>
          <option value="01-22">1/22（木）</option>
          <option value="01-23">1/23（金）</option>
          <option value="01-24">1/24（土）※トーク③</option>
          <option value="01-25">1/25（日）※ライブ②</option>
          <option value="01-26">1/26（月）最終日</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:16px">
        <label for="new-time">新しい時間帯</label>
        <select id="new-time">
          <option value="">— 時間帯を選択 —</option>
          <option>12:00</option><option>12:30</option><option>13:00</option>
          <option>13:30</option><option>14:00</option><option>14:30</option>
          <option>15:00</option><option>15:30</option><option>16:00</option>
          <option>16:30</option><option>17:00</option><option>17:30</option>
          <option>18:00</option>
        </select>
      </div>
      <!-- イベント解除警告 / イベント追加 -->
      <div id="event-warning" style="display:none;margin-bottom:16px;padding:14px 16px;background:rgba(227,79,112,0.08);border:1px solid rgba(227,79,112,0.3);border-radius:3px;">
        <p style="font-size:12px;color:#E34F70;font-weight:500;margin-bottom:6px;font-family:'DM Sans',sans-serif;letter-spacing:0.05em">⚠️ イベント予約について</p>
        <p id="event-warning-text" style="font-size:12px;color:#F0EEE9;line-height:1.7;font-family:'Noto Sans JP',sans-serif;font-weight:300"></p>
      </div>

      <!-- 変更先にイベントがある場合：参加するか選べる -->
      <div id="new-event-wrap" style="display:none;margin-bottom:16px;padding:14px 16px;background:rgba(58,167,201,0.06);border:1px solid rgba(58,167,201,0.25);border-radius:3px;">
        <p style="font-size:11px;color:#3AA7C9;font-weight:500;margin-bottom:10px;font-family:'DM Sans',sans-serif;letter-spacing:0.12em;text-transform:uppercase">★ この日はイベントがあります</p>
        <div id="new-event-check" style="display:flex;align-items:flex-start;gap:12px;cursor:pointer">
          <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer">
            <input type="checkbox" id="join-new-event" style="display:none">
            <span id="new-event-box" style="width:20px;height:20px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.2s;background:transparent"></span>
            <span id="new-event-label" style="font-size:13px;color:#F0EEE9;line-height:1.6;font-family:'Noto Sans JP',sans-serif;font-weight:300"></span>
          </label>
        </div>
      </div>

      <div style="display:flex;gap:10px">
        <button class="btn-primary" id="btn-submit-change" style="flex:1">変更を確定する</button>
        <button class="btn-cancel-no" id="btn-cancel-change" style="flex:0 0 80px">戻る</button>
      </div>
    </div>

    <!-- キャンセル確認 -->
    <div class="cancel-confirm" id="cancel-confirm">
      <p>予約をキャンセルしてもよろしいですか？<br>キャンセル後は同じ時間帯を再予約できない場合があります。</p>
      <div class="cancel-confirm-btns">
        <button class="btn-cancel-yes" id="btn-confirm-cancel">キャンセルする</button>
        <button class="btn-cancel-no" id="btn-deny-cancel">戻る</button>
      </div>
    </div>

    <!-- 結果メッセージ -->
    <div class="result-msg" id="result-msg"></div>
  </div>

  <!-- 見つからない -->
  <div class="not-found" id="not-found">
    <p>予約が見つかりませんでした。<br>予約番号とメールアドレスをご確認ください。</p>
  </div>

  <a href="index.html" class="back-link">← 展覧会トップページへ戻る</a>
</main>

<script>
(function(){
  /* ★ GASのURLをここに貼り付け（reservation.jsと同じURL） */
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbzt-Jf4lAlPeIZkpIVToxM36jvtAOywTyHRG7Ldp16ZYV5fspzKS0ArXhTc4TLcIOSm/exec';

  /* URLパラメータから予約IDを取得（メールリンクから来た場合） */
  var params = new URLSearchParams(location.search);
  var preId  = params.get('id') || '';
  if (preId) document.getElementById('input-id').value = preId;

  var currentReservation = null;

  function $(id){ return document.getElementById(id); }

  /* ── 予約照会 ── */
  $('btn-lookup').addEventListener('click', function(){
    var id    = $('input-id').value.trim().toUpperCase();
    var email = $('input-email').value.trim();

    $('lookup-error').style.display = 'none';
    $('not-found').classList.remove('visible');
    $('res-card').classList.remove('visible');

    if (!id || !email) {
      $('lookup-error').textContent = '予約番号とメールアドレスを入力してください';
      $('lookup-error').style.display = 'block';
      return;
    }

    $('btn-lookup').disabled = true;
    $('btn-lookup').textContent = '確認中…';

    callGAS({ action: 'lookup', reservationId: id, email: email }, function(res){
      $('btn-lookup').disabled = false;
      $('btn-lookup').textContent = '予約を確認する';

      if (res && res.success && res.reservation) {
        currentReservation = res.reservation;
        showCard(res.reservation);
      } else {
        $('not-found').classList.add('visible');
      }
    });
  });

  function showCard(r){
    $('card-id').textContent = r.reservationId;
    var statusEl = $('card-status');
    if (r.cancelled) {
      statusEl.textContent = 'キャンセル済';
      statusEl.className   = 'res-status cancelled';
    } else {
      statusEl.textContent = '予約中';
      statusEl.className   = 'res-status active';
    }

    /* 来場日を読みやすい形式に変換 */
    var dateMap = {
      '01-10':'1月10日（土）開幕日','01-11':'1月11日（日）','01-12':'1月12日（月）',
      '01-14':'1月14日（水）','01-15':'1月15日（木）','01-16':'1月16日（金）',
      '01-17':'1月17日（土）','01-18':'1月18日（日）','01-19':'1月19日（月）',
      '01-21':'1月21日（水）','01-22':'1月22日（木）','01-23':'1月23日（金）',
      '01-24':'1月24日（土）','01-25':'1月25日（日）','01-26':'1月26日（月）最終日'
    };
    var evMap = {
      'talk1':'1/11 トーク「AFTER IMAGE と、10年のキュレーション」',
      'talk2':'1/17 トーク「記憶・物質・イメージの残り方」',
      'live1':'1/18 ライブ「AFTER IMAGE / Light Trace」',
      'talk3':'1/24 トーク「若手作家が語る "AFTER IMAGE"」'
    };
    var rows = [
      ['お名前', r.name || '—'],
      ['来場日', dateMap[r.visitDate] || r.visitDate || '—'],
      ['時間帯', r.visitTime ? r.visitTime + '〜' : '—'],
      ['同伴人数', (r.companions || '0') + '名'],
      ['受付日時', fmtTimestamp(r.timestamp) || '—'],
    ];
    if (r.talkEvents && r.talkEvents.length) {
      var evNames = r.talkEvents.map(function(e){ return evMap[e] || e; }).join('<br>');
      rows.push(['イベント参加', evNames]);
    }
    $('card-body').innerHTML = rows.map(function(row){
      return '<div class="res-row"><span class="res-key">' + row[0] +
             '</span><span class="res-val">' + row[1] + '</span></div>';
    }).join('');

    /* キャンセル済の場合はアクションを非表示 */
    $('res-actions').style.display = r.cancelled ? 'none' : 'flex';
    $('change-form').classList.remove('visible');
    $('cancel-confirm').classList.remove('visible');
    $('result-msg').className = 'result-msg';

    $('res-card').classList.add('visible');
  }

  /* ── 変更フォーム ── */
  $('btn-show-change').addEventListener('click', function(){
    $('change-form').classList.add('visible');
    $('cancel-confirm').classList.remove('visible');
  });
  $('btn-cancel-change').addEventListener('click', function(){
    $('change-form').classList.remove('visible');
  });

  $('btn-submit-change').addEventListener('click', function(){
    var newDate = $('new-date').value;
    var newTime = $('new-time').value;
    if (!newDate || !newTime) {
      alert('来場日と時間帯を選択してください');
      return;
    }
    $('btn-submit-change').disabled = true;
    $('btn-submit-change').textContent = '変更中…';

    var newDateEvent   = EVENT_DATES[newDate];
    var currentEvents  = currentReservation.talkEvents || [];
    var sameEvents     = newDateEvent && currentEvents.indexOf(newDateEvent.id) !== -1;
    var clearEvents    = currentEvents.length > 0 && !sameEvents;
    /* 新しいイベントに申し込むか */
    var joinNewEvent   = $('join-new-event') && $('join-new-event').checked;
    var newEvents      = (joinNewEvent && newDateEvent) ? [newDateEvent.id] : [];

    callGAS({
      action: 'change',
      reservationId: currentReservation.reservationId,
      email: $('input-email').value.trim(),
      newDate: newDate,
      newTime: newTime,
      clearEvents: clearEvents,
      newEvents: newEvents
    }, function(res){
      $('btn-submit-change').disabled = false;
      $('btn-submit-change').textContent = '変更を確定する';
      $('change-form').classList.remove('visible');

      var msg = $('result-msg');
      if (res && res.success) {
        msg.className = 'result-msg success';
        msg.textContent = '✓ 変更が完了しました。確認メールをお送りしました。';
        currentReservation.visitDate = newDate;
        currentReservation.visitTime = newTime;
        showCard(currentReservation);
      } else {
        msg.className = 'result-msg error-box';
        msg.textContent = (res && res.message) ? res.message : '変更に失敗しました。再度お試しください。';
      }
    });
  });

  /* ── キャンセル ── */
  $('btn-show-cancel').addEventListener('click', function(){
    $('cancel-confirm').classList.add('visible');
    $('change-form').classList.remove('visible');
  });
  $('btn-deny-cancel').addEventListener('click', function(){
    $('cancel-confirm').classList.remove('visible');
  });

  $('btn-confirm-cancel').addEventListener('click', function(){
    $('btn-confirm-cancel').disabled = true;
    $('btn-confirm-cancel').textContent = '処理中…';

    callGAS({
      action: 'cancel',
      reservationId: currentReservation.reservationId,
      email: $('input-email').value.trim()
    }, function(res){
      $('btn-confirm-cancel').disabled = false;
      $('btn-confirm-cancel').textContent = 'キャンセルする';
      $('cancel-confirm').classList.remove('visible');

      var msg = $('result-msg');
      if (res && res.success) {
        msg.className = 'result-msg success';
        msg.textContent = '✓ 予約をキャンセルしました。確認メールをお送りしました。';
        currentReservation.cancelled = true;
        showCard(currentReservation);
      } else {
        msg.className = 'result-msg error-box';
        msg.textContent = (res && res.message) ? res.message : 'キャンセルに失敗しました。再度お試しください。';
      }
    });
  });

  /* ── 日時フォーマット ── */
  function fmtTimestamp(ts) {
    if (!ts) return '—';
    /* ISO形式 "2026-04-26T02:04:38.000Z" → "2026年4月26日 11:04" (JST) */
    try {
      var d = new Date(ts);
      if (isNaN(d)) return ts; /* パース失敗時はそのまま返す */
      var jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
      return jst.getUTCFullYear() + '年' +
             (jst.getUTCMonth() + 1) + '月' +
             jst.getUTCDate() + '日 ' +
             String(jst.getUTCHours()).padStart(2,'0') + ':' +
             String(jst.getUTCMinutes()).padStart(2,'0');
    } catch(e) { return ts; }
  }

  /* ── イベントのある日付 ── */
  var EVENT_DATES = {
    '01-11': { id:'talk1', label:'トーク「AFTER IMAGE と、10年のキュレーション」', detail:'1/11（日）17:00–18:15 ／ 定員40名' },
    '01-17': { id:'talk2', label:'トーク「記憶・物質・イメージの残り方」',         detail:'1/17（土）18:00–19:00 ／ 定員35名' },
    '01-18': { id:'live1', label:'ライブ「AFTER IMAGE / Light Trace」',          detail:'1/18（日）18:30–19:10 ／ 定員30名' },
    '01-24': { id:'talk3', label:'トーク「若手作家が語る "AFTER IMAGE"」',         detail:'1/24（土）16:00–17:00 ／ 定員50名' },
    '01-25': { id:'live2', label:'ライブ「Archive Body」',                        detail:'1/25（日）17:30–18:00 ／ 予約不要' }
  };

  /* 日付変更時：警告 or 新イベント選択を表示 */
  $('new-date').addEventListener('change', function(){
    var newDate      = $('new-date').value;
    var warning      = $('event-warning');
    var warningTxt   = $('event-warning-text');
    var newEventWrap = $('new-event-wrap');
    var newEventLbl  = $('new-event-label');
    var newEventBox  = $('new-event-box');
    var joinCheck    = $('join-new-event');

    warning.style.display      = 'none';
    newEventWrap.style.display = 'none';
    joinCheck.checked          = false;
    newEventBox.style.background = 'transparent';
    newEventBox.innerHTML = '';

    var currentEvents = (currentReservation && currentReservation.talkEvents) || [];
    var newDateEvent  = EVENT_DATES[newDate];

    if (currentEvents.length > 0) {
      /* 現在イベントあり → 別の日または別イベントに変更 */
      var sameEvents = newDateEvent && currentEvents.indexOf(newDateEvent.id) !== -1;
      if (!sameEvents) {
        var currentLabels = currentEvents.map(function(id){
          for (var d in EVENT_DATES) { if (EVENT_DATES[d].id === id) return EVENT_DATES[d].label; }
          return id;
        });
        var msg = '現在「' + currentLabels.join('」「') + '」にご参加予定です。';
        if (newDateEvent) {
          msg += '<br>変更後の日には別のイベントがあります。元のイベント予約は自動的にキャンセルされます。下のチェックで新しいイベントにも申し込めます。';
          warningTxt.innerHTML = msg;
          warning.style.display = 'block';
          /* 新イベント選択を表示 */
          newEventLbl.innerHTML = '<strong>' + newDateEvent.label + '</strong><br><small style="color:#6B7280">' + newDateEvent.detail + '</small>';
          newEventWrap.style.display = 'block';
        } else {
          msg += '<br>変更後の日にはイベントがないため、元のイベント予約は自動的にキャンセルされます。';
          warningTxt.innerHTML = msg;
          warning.style.display = 'block';
        }
      }
    } else if (newDateEvent) {
      /* 現在イベントなし → イベントある日に変更 */
      newEventLbl.innerHTML = '<strong>' + newDateEvent.label + '</strong><br><small style="color:#6B7280">' + newDateEvent.detail + '</small>';
      newEventWrap.style.display = 'block';
    }
  });

  /* チェックボックスのビジュアル更新 */
  document.addEventListener('change', function(e){
    if (e.target && e.target.id === 'join-new-event') {
      var box = $('new-event-box');
      if (e.target.checked) {
        box.style.background = '#E34F70';
        box.style.borderColor = '#E34F70';
        box.innerHTML = '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><polyline points="1 4 4 7 9 1" stroke="white" stroke-width="1.5"/></svg>';
      } else {
        box.style.background = 'transparent';
        box.style.borderColor = 'rgba(255,255,255,0.15)';
        box.innerHTML = '';
      }
    }
  });

  /* ── GAS通信 ── */
  function callGAS(data, callback) {
    if (!GAS_URL || GAS_URL.indexOf('【') !== -1) {
      /* デモ動作 */
      setTimeout(function(){
        if (data.action === 'lookup') {
          callback({ success: true, reservation: {
            reservationId: data.reservationId,
            name: 'テスト 太郎', visitDate: '01-11', visitTime: '14:00',
            companions: '1', timestamp: '2026/01/05 10:00:00',
            talkEvents: ['talk1'], cancelled: false
          }});
        } else {
          callback({ success: true });
        }
      }, 800);
      return;
    }
    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    })
    .then(function(r){ return r.json(); })
    .then(callback)
    .catch(function(){ callback({ success: false, message: 'ネットワークエラーが発生しました。' }); });
  }

})();
</script>
